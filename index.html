<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>L'ura Symbol Tracker</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 120px);
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
}

button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    width: 120px;
    height: 120px;
}

button img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

button:hover img {
    filter: brightness(1.2);
    transform: scale(1.05);
    transition: all 0.2s ease;
}

#sequence {
    font-size: 24px;
    margin: 20px 0;
    word-break: break-word;
    min-height: 40px;
}

.clear {
    background: #c62828;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

.clear:hover {
    background: #b71c1c;
}
</style>
</head>
<body>

<h1>L'ura - Death's Dirge Tracker</h1>

<div class="buttons">
    <button onclick="add('Circle')">
        <img src="images/circle.png" alt="Circle">
    </button>
    <button onclick="add('Triangle')">
        <img src="images/triangle.png" alt="Triangle">
    </button>
    <button onclick="add('Diamond')">
        <img src="images/diamond.png" alt="Diamond">
    </button>
    <button onclick="add('T')">
        <img src="images/t.png" alt="T">
    </button>
    <button onclick="add('X')">
        <img src="images/x.png" alt="X">
    </button>
</div>

<h2>Kolejność:</h2>
<div id="sequence">—</div>

<button class="clear" onclick="clearSeq()">Wyczyść</button>

<script>
let seq = [];

function add(symbol) {
    seq.push(symbol);
    render();
}

function clearSeq() {
    seq = [];
    render();
}

function render() {
    document.getElementById("sequence").textContent =
        seq.length ? seq.join(" → ") : "—";
}
</script>

</body>
</html>
